<div class="page-header">
  <h1>{{ isEdit ? 'Edit Article' : 'New Article' }}</h1>
  <a routerLink="/admin/news" class="btn btn-outline">← Back</a>
</div>

<div *ngIf="loading" class="loading">Loading…</div>

<form #f="ngForm" (ngSubmit)="save(f)" novalidate *ngIf="!loading" class="card form-card">

  <div class="alert-error" *ngIf="error">{{ error }}</div>

  <div class="form-grid">
    <div class="form-row span-2">
      <label>Title *</label>
      <input name="title" [(ngModel)]="model.title" required (blur)="autoSlug()" placeholder="Article title" />
    </div>
    <div class="form-row span-2">
      <label>Slug *</label>
      <input name="slug" [(ngModel)]="model.slug" required placeholder="url-friendly-slug" />
    </div>
    <div class="form-row">
      <label>Category</label>
      <input name="category" [(ngModel)]="model.category" placeholder="e.g. Announcement, Event" />
    </div>
    <div class="form-row">
      <label>Published Date</label>
      <input type="date" name="published_at" [(ngModel)]="model.published_at" />
    </div>
    <div class="form-row span-2">
      <label>Summary</label>
      <textarea name="summary" [(ngModel)]="model.summary" rows="3" placeholder="Brief summary shown in news listing…"></textarea>
    </div>
    <div class="form-row span-2">
      <label>Content *</label>
      <textarea name="content" [(ngModel)]="model.content" required rows="12" placeholder="Full article content (HTML supported)…"></textarea>
    </div>
    <div class="form-row">
      <label>Thumbnail</label>
      <input type="file" accept="image/*" (change)="onThumbnailChange($event)" />
    </div>
    <div class="form-row checkboxes">
      <label class="checkbox-label">
        <input type="checkbox" name="is_published" [(ngModel)]="model.is_published" />
        Published
      </label>
      <label class="checkbox-label">
        <input type="checkbox" name="is_featured" [(ngModel)]="model.is_featured" />
        Featured
      </label>
    </div>
  </div>

  <div class="form-actions">
    <a routerLink="/admin/news" class="btn btn-outline">Cancel</a>
    <button type="submit" class="btn btn-primary" [disabled]="saving">
      {{ saving ? 'Saving…' : (isEdit ? 'Update Article' : 'Create Article') }}
    </button>
  </div>

</form>
