<div class="page-header">
  <h1>{{ isEdit ? 'Edit Article' : 'New Article' }}</h1>
  <a routerLink="/admin/news" class="btn btn-outline">← Back</a>
</div>

<div *ngIf="loading" class="loading">Loading…</div>

<form #f="ngForm" (ngSubmit)="save(f)" novalidate *ngIf="!loading" class="card form-card">

  <div class="alert-error" *ngIf="error">{{ error }}</div>

  <div class="form-grid">
    <div class="form-row span-2">
      <label>Title *</label>
      <input name="title" [(ngModel)]="model.title" required (blur)="autoSlug()" placeholder="Article title" />
    </div>
    <div class="form-row span-2">
      <label>Slug *</label>
      <input name="slug" [(ngModel)]="model.slug" required placeholder="url-friendly-slug" />
    </div>
    <div class="form-row">
      <label>Tag / Category</label>
      <input name="tag" [(ngModel)]="model.tag" placeholder="e.g. Announcement, Event" />
    </div>
    <div class="form-row">
      <label>Publish At</label>
      <input type="datetime-local" name="publish_at" [(ngModel)]="model.publish_at" />
    </div>
    <div class="form-row span-2">
      <label>Summary</label>
      <textarea name="summary" [(ngModel)]="model.summary" rows="3" maxlength="400" placeholder="Brief summary shown in news cards (max 400 chars)…"></textarea>
    </div>
    <div class="form-row span-2">
      <label>Content</label>
      <textarea name="body" [(ngModel)]="model.body" rows="12" placeholder="Full article content (HTML supported)…"></textarea>
    </div>
    <div class="form-row">
      <label>Image</label>
      <input type="file" accept="image/*" (change)="onImageChange($event)" />
      <img *ngIf="existingImage && !imageFile" [src]="imageUrl(existingImage)" style="max-height:120px;margin-top:8px;border-radius:6px" />
    </div>
    <div class="form-row checkboxes">
      <label class="checkbox-label">
        <select name="status" [(ngModel)]="model.status" style="width:auto">
          <option value="draft">Draft</option>
          <option value="published">Published</option>
        </select>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" name="is_featured" [(ngModel)]="model.is_featured" />
        Featured
      </label>
    </div>
  </div>

  <div class="form-actions">
    <a routerLink="/admin/news" class="btn btn-outline">Cancel</a>
    <button type="submit" class="btn btn-primary" [disabled]="saving">
      {{ saving ? 'Saving…' : (isEdit ? 'Update Article' : 'Create Article') }}
    </button>
  </div>

</form>
